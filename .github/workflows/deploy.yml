name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          DEPLOY_TARGET: gh-pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Find issue number from merge commit
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the merge commit message to find the issue number
          COMMIT_MSG=$(git log -1 --pretty=%B)
          ISSUE_NUMBER=$(echo "${COMMIT_MSG}" | grep -oP 'Closes #\K\d+' || echo "")
          if [ -z "${ISSUE_NUMBER}" ]; then
            # Try to find from recent closed issues with auto-feedback label
            ISSUE_NUMBER=$(gh issue list --state closed --label auto-feedback --limit 1 --json number --jq '.[0].number')
          fi
          echo "number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
          echo "Found issue: ${ISSUE_NUMBER}"

      - name: Notify Workers of deployment
        if: steps.issue.outputs.number != ''
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          curl -s -X POST "${{ secrets.WORKERS_URL }}/api/notify" \
            -H "Content-Type: application/json" \
            -H "x-notify-secret: ${{ secrets.NOTIFY_SECRET }}" \
            -d "{\"type\":\"deployed\",\"issueNumber\":${ISSUE_NUMBER}}"
