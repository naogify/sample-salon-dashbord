# templates/feedback.yml
# Copy this file to .github/workflows/feedback.yml in the target project
name: Auto Feedback - Code Modification

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  modify-code:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'auto-feedback')) ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'auto-feedback') && github.event.comment.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      deployments: read
    steps:
      - uses: actions/checkout@v4

      - name: Collect feedback context
        id: context
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "prompt<<EOF" >> $GITHUB_OUTPUT
            echo "${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "prompt<<EOF" >> $GITHUB_OUTPUT
            echo "Original feedback:" >> $GITHUB_OUTPUT
            echo "${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "Additional instruction:" >> $GITHUB_OUTPUT
            echo "${{ github.event.comment.body }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        timeout-minutes: 10
        continue-on-error: true
        run: |
          claude --dangerously-skip-permissions --model sonnet --max-turns 20 -p "${{ steps.context.outputs.prompt }}" < /dev/null

      - name: Notify on Claude Code failure
        if: steps.claude.outcome == 'failure'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -s -X POST "${{ secrets.WORKERS_URL }}/api/notify" \
            -H "Content-Type: application/json" \
            -H "x-notify-secret: ${{ secrets.NOTIFY_SECRET }}" \
            -d "{\"type\":\"error\",\"issueNumber\":${ISSUE_NUMBER},\"errorMessage\":\"AI processing failed\"}"
          exit 1

      - name: Create or update PR
        id: pr
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="feedback/issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean up: delete local branch if exists, then create fresh from current HEAD
          git branch -D "${BRANCH}" 2>/dev/null || true
          if git ls-remote --heads origin "${BRANCH}" | grep -q "${BRANCH}"; then
            git fetch origin "${BRANCH}"
            git checkout -b "${BRANCH}" "origin/${BRANCH}"
            git merge origin/main --no-edit || true
          else
            git checkout -b "${BRANCH}"
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            # Notify Workers that no changes were needed
            curl -s -X POST "${{ secrets.WORKERS_URL }}/api/notify" \
              -H "Content-Type: application/json" \
              -H "x-notify-secret: ${{ secrets.NOTIFY_SECRET }}" \
              -d "{\"type\":\"no_changes\",\"issueNumber\":${ISSUE_NUMBER}}"
            exit 0
          fi
          git commit -m "Apply feedback from issue #${ISSUE_NUMBER}"
          git push origin "${BRANCH}" --force
          echo "has_changes=true" >> $GITHUB_OUTPUT

          EXISTING_PR=$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number')
          if [ -z "${EXISTING_PR}" ]; then
            PR_URL=$(gh pr create \
              --title "Apply feedback from issue #${ISSUE_NUMBER}" \
              --body "Auto-generated from customer feedback. Closes #${ISSUE_NUMBER}" \
              --head "${BRANCH}" \
              --base main)
            PR_NUMBER=$(echo "${PR_URL}" | grep -oP '\d+$')
          else
            PR_NUMBER="${EXISTING_PR}"
          fi
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Notify on PR creation failure
        if: steps.pr.outcome == 'failure'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -s -X POST "${{ secrets.WORKERS_URL }}/api/notify" \
            -H "Content-Type: application/json" \
            -H "x-notify-secret: ${{ secrets.NOTIFY_SECRET }}" \
            -d "{\"type\":\"error\",\"issueNumber\":${ISSUE_NUMBER},\"errorMessage\":\"PR creation failed\"}"
          exit 1

      - name: Build check
        if: steps.pr.outcome == 'success' && steps.pr.outputs.has_changes == 'true'
        id: build
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          npm ci
          npm run build 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Handle build failure
        if: steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          RETRY_LABELS=$(gh issue view "${ISSUE_NUMBER}" --json labels --jq '.labels[].name' | grep '^retry-' || echo "")
          CURRENT_RETRY=0
          if [ -n "${RETRY_LABELS}" ]; then
            CURRENT_RETRY=$(echo "${RETRY_LABELS}" | sed 's/retry-//' | sort -n | tail -1)
          fi
          NEXT_RETRY=$((CURRENT_RETRY + 1))

          if [ ${NEXT_RETRY} -ge 3 ]; then
            gh issue label add "${ISSUE_NUMBER}" --name "needs-human"
            curl -s -X POST "${{ secrets.WORKERS_URL }}/api/notify" \
              -H "Content-Type: application/json" \
              -H "x-notify-secret: ${{ secrets.NOTIFY_SECRET }}" \
              -d "{\"type\":\"error\",\"issueNumber\":${ISSUE_NUMBER},\"errorMessage\":\"Build failed after 3 retries\"}"
          else
            BUILD_ERROR=$(tail -50 build-output.txt)
            COMMENT_BODY=$(printf "Build error (retry %s/3):\n\n\`\`\`\n%s\n\`\`\`\n\nPlease fix this build error." "${NEXT_RETRY}" "${BUILD_ERROR}")
            gh issue comment "${ISSUE_NUMBER}" --body "${COMMENT_BODY}"
            if [ -n "${RETRY_LABELS}" ]; then
              gh issue label remove "${ISSUE_NUMBER}" --name "retry-${CURRENT_RETRY}" || true
            fi
            gh issue label add "${ISSUE_NUMBER}" --name "retry-${NEXT_RETRY}"
            curl -s -X POST "${{ secrets.WORKERS_URL }}/api/notify" \
              -H "Content-Type: application/json" \
              -H "x-notify-secret: ${{ secrets.NOTIFY_SECRET }}" \
              -d "{\"type\":\"error\",\"issueNumber\":${ISSUE_NUMBER},\"errorMessage\":\"Build failed, retrying\"}"
          fi
          exit 1

      - name: Deploy preview to Cloudflare Pages
        if: steps.build.outcome == 'success' && steps.pr.outputs.has_changes == 'true'
        id: preview
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="feedback/issue-${ISSUE_NUMBER}"
          DEPLOY_OUTPUT=$(npx wrangler pages deploy out --project-name sample-salon-dashboard --branch "${BRANCH}" 2>&1)
          echo "${DEPLOY_OUTPUT}"
          PREVIEW_URL=$(echo "${DEPLOY_OUTPUT}" | grep -oP 'https://[a-z0-9]+\.sample-salon-dashboard\.pages\.dev')
          if [ -n "${PREVIEW_URL}" ]; then
            echo "url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          else
            echo "url=https://github.com/${{ github.repository }}/pull/${{ steps.pr.outputs.pr_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Notify Workers with preview URL
        if: steps.build.outcome == 'success' && steps.pr.outputs.has_changes == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue label remove "${ISSUE_NUMBER}" --name "retry-0" --name "retry-1" --name "retry-2" 2>/dev/null || true

          curl -s -X POST "${{ secrets.WORKERS_URL }}/api/notify" \
            -H "Content-Type: application/json" \
            -H "x-notify-secret: ${{ secrets.NOTIFY_SECRET }}" \
            -d "{\"type\":\"preview\",\"issueNumber\":${ISSUE_NUMBER},\"previewUrl\":\"${PREVIEW_URL}\",\"prNumber\":${PR_NUMBER}}"
